<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>村上中央自動車学校｜学科問題</title>
<style>
*{box-sizing:border-box}
html{font-size:16px}
body{
  margin:0;
  font-family:Arial,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background:#eef4f8;
  color:#003b70;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:22px 12px 44px;
}
.app{
  background:#fff;
  border:3px solid #003b70;
  border-radius:14px;
  padding:26px 22px 30px;
  box-shadow:0 8px 24px rgba(0,40,80,.12);
}
.header{
  text-align:center;
  margin-bottom:22px;
}
.logo-img{
  display:block;
  width:210px;
  max-width:70%;
  height:auto;
  margin:0 auto 12px;
}
.school{
  margin:0;
  font-size:32px;
  line-height:1.35;
  font-weight:900;
  letter-spacing:.03em;
  color:#003b70;
}
.app-title{
  margin:10px 0 0;
  font-size:18px;
  font-weight:800;
  color:#666;
}
.lead{
  background:linear-gradient(180deg,#f7fbff,#eaf6ff);
  border:2px solid #2ab7d8;
  border-radius:16px;
  padding:16px 14px;
  margin:0 0 20px;
  text-align:center;
  font-size:21px;
  line-height:1.55;
  font-weight:900;
}
.lead .orange{color:#ff8200}
.menu{
  display:grid;
  gap:16px;
}
.menu a{
  display:flex;
  align-items:center;
  min-height:92px;
  gap:16px;
  padding:16px 18px;
  text-decoration:none;
  color:#fff;
  background:#00467f;
  border-radius:14px;
  font-size:27px;
  line-height:1.25;
  font-weight:900;
  box-shadow:0 5px 0 #002d55;
}
.menu a:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #002d55;
}
.icon{
  flex:0 0 56px;
  width:56px;
  height:56px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  color:#00467f;
  font-size:25px;
  font-weight:900;
}
.text small{
  display:block;
  margin-top:5px;
  font-size:16px;
  line-height:1.35;
  font-weight:800;
  opacity:.95;
}
.recommend{
  background:#ff8a00!important;
  box-shadow:0 5px 0 #b85f00!important;
}
.recommend .icon{color:#ff8a00}
.footer{
  margin-top:24px;
  text-align:center;
  font-size:14px;
  color:#666;
}
@media(max-width:600px){
  .wrapper{padding:10px 6px 34px}
  .app{border-width:2px;border-radius:0;padding:22px 12px 26px}
  .logo-img{width:180px;max-width:72%;margin-bottom:10px}
  .school{font-size:28px}
  .app-title{font-size:16px}
  .lead{font-size:18px;padding:14px 10px;margin-bottom:18px}
  .menu{gap:15px}
  .menu a{min-height:88px;font-size:23px;padding:15px 13px;gap:12px;border-radius:12px}
  .icon{flex-basis:48px;width:48px;height:48px;font-size:22px}
  .text small{font-size:14px}
}
</style>
</head>
<body>
<div class="wrapper">
  <main class="app">
    <header class="header">
      <img class="logo-img" src="logo.png" alt="村上中央自動車学校ロゴ" onerror="this.style.display='none'">
      <h1 class="school">村上中央自動車学校</h1>
      <p class="app-title">学科テスト問題アプリ</p>
    </header>

    <section class="lead">
      本番と同じ<span class="orange">○×形式</span>で練習できます。<br>
      まずはおすすめ問題から始めましょう。
    </section>

    <nav class="menu" aria-label="学科問題メニュー">
      <a class="recommend" href="mistake.html">
        <span class="icon">★</span>
        <span class="text">おすすめ問題<br><small>間違いの多い問題50問</small></span>
      </a>
      <a href="sign.html">
        <span class="icon">①</span>
        <span class="text">標識・標示問題<br><small>標識の意味を確認する50問</small></span>
      </a>
      <a href="bike.html">
        <span class="icon">②</span>
        <span class="text">二輪車問題<br><small>二輪車関係の学科対策50問</small></span>
      </a>
    </nav>

    <div class="footer">© 村上中央自動車学校</div>
  </main>
</div>
</body>
</html>
