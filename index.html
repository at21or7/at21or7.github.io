<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>村上中央自動車学校｜学科問題</title>
<style>
*{box-sizing:border-box}
html{font-size:16px}
body{
  margin:0;
  font-family:Arial,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background:#eef4f8;
  color:#003b70;
}
.wrapper{
  max-width:900px;
  margin:0 auto;
  padding:18px 10px 40px;
}
.app{
  background:#fff;
  border:3px solid #00477f;
  border-radius:14px;
  padding:28px 22px 34px;
  box-shadow:0 8px 20px rgba(0,40,80,.08);
}
.logo-area{
  text-align:center;
  margin-bottom:24px;
}
.logo-area img{
  width:230px;
  max-width:72%;
  height:auto;
  margin-bottom:10px;
}
h1{
  margin:0;
  font-size:32px;
  letter-spacing:.04em;
  color:#00477f;
}
.subtitle{
  margin:12px 0 0;
  font-size:18px;
  font-weight:bold;
  color:#555;
}
.info{
  border:2px solid #14aee2;
  background:#eef9ff;
  border-radius:14px;
  text-align:center;
  padding:18px 12px;
  margin:28px 2px 22px;
  font-size:21px;
  font-weight:bold;
  line-height:1.65;
}
.orange{color:#ff8200}
.menu{
  display:block;
  text-decoration:none;
  color:#fff;
  border-radius:13px;
  margin:14px 2px;
  padding:20px 18px;
  min-height:88px;
  box-shadow:0 6px 0 rgba(0,0,0,.18);
}
.recommend{background:#ff8700}
.normal{background:#004b82}
.menu-inner{
  display:flex;
  align-items:center;
  gap:18px;
}
.icon{
  flex:0 0 58px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:#fff;
  color:#004b82;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:bold;
}
.recommend .icon{color:#ff8700}
.menu-title{
  font-size:30px;
  font-weight:bold;
  line-height:1.2;
}
.menu-desc{
  margin-top:8px;
  font-size:17px;
  font-weight:bold;
  opacity:.95;
}
.footer{
  text-align:center;
  color:#666;
  margin-top:28px;
  font-size:14px;
}
@media(max-width:600px){
  .wrapper{padding:10px 6px 30px}
  .app{padding:24px 14px 30px;border-radius:10px}
  .logo-area img{width:190px}
  h1{font-size:25px;line-height:1.35}
  .subtitle{font-size:15px}
  .info{font-size:18px;padding:15px 8px;margin:22px 0 20px}
  .menu{min-height:86px;padding:17px 14px;margin:13px 0}
  .menu-inner{gap:14px}
  .icon{flex-basis:52px;width:52px;height:52px;font-size:28px}
  .menu-title{font-size:25px}
  .menu-desc{font-size:15px}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="app">
    <div class="logo-area">
      <img src="logo.png" alt="村上中央自動車学校ロゴ">
      <h1>村上中央自動車学校</h1>
      <p class="subtitle">学科テスト問題アプリ</p>
    </div>

    <div class="info">
      本番と同じ<span class="orange">○×形式</span>で練習できます。<br>
      まずはおすすめ問題から始めましょう。
    </div>

    <a class="menu recommend" href="https://at21or7.github.io/traffic-quiz-2/">
      <div class="menu-inner">
        <div class="icon">★</div>
        <div>
          <div class="menu-title">おすすめ問題</div>
          <div class="menu-desc">間違いの多い問題50問</div>
        </div>
      </div>
    </a>

    <a class="menu normal" href="https://at21or7.github.io/traffic-quiz/">
      <div class="menu-inner">
        <div class="icon">①</div>
        <div>
          <div class="menu-title">二輪車問題</div>
          <div class="menu-desc">二輪車関係の学科対策50問</div>
        </div>
      </div>
    </a>

    <a class="menu normal" href="https://at21or7.github.io/traffic-quiz-3/">
      <div class="menu-inner">
        <div class="icon">②</div>
        <div>
          <div class="menu-title">標識・標示問題</div>
          <div class="menu-desc">標識等の意味を確認する50問</div>
        </div>
      </div>
    </a>

    <div class="footer">© 村上中央自動車学校</div>
  </div>
</div>
</body>
</html>
